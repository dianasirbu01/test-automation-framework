name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ui-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
      - name: Run UI tests
        run: npx playwright test tests/ui
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ui-report
          path: playwright-report/
          retention-days: 7

  api-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run API tests
        run: npx playwright test tests/api
      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-report
          path: playwright-report/
          retention-days: 7