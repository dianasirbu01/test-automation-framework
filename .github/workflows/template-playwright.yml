name: Reusable Playwright Runner

on:
  workflow_call:
    inputs:
      test-path:
        required: true
        type: string
      project-name:
        required: true
        type: string

jobs:
  run-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Run tests
        run: npx playwright test ${{ inputs.test-path }}

      - name: Upload report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.project-name }}-report
          path: playwright-report/
          retention-days: 7
